# Bath Boost (Badebooster) Dashboard Card
# Copy this into your HA dashboard YAML editor.
# Adjust entity IDs to match your installation.
#
# The entity IDs below assume your device name is "Luxtronik 2.0".
# HA generates entity IDs from the device name, so yours may differ.
#
# Option 1: Mushroom template card (recommended — requires mushroom-cards from HACS)
# Option 2: Simple entities card (no HACS dependencies)

# --- Option 1: Mushroom template card ---
type: vertical-stack
cards:
  - type: custom:mushroom-template-card
    primary: Bath Boost
    secondary: >-
      {% set status = states('sensor.luxtronik_2_0_bath_boost_status') %}
      {% if status == 'Active' %}
        {{ state_attr('sensor.luxtronik_2_0_bath_boost_status', 'current_temperature') | round(1) }}°C
        → {{ state_attr('sensor.luxtronik_2_0_bath_boost_status', 'target_temperature') }}°C
        ({{ state_attr('sensor.luxtronik_2_0_bath_boost_status', 'progress_percent') | round(0) }}%)
        {% set remaining = state_attr('sensor.luxtronik_2_0_bath_boost_status', 'estimated_remaining_minutes') %}
        {% if remaining %}~{{ remaining }} min{% endif %}
      {% else %}
        Ready — tap to start
      {% endif %}
    icon: mdi:water-boiler
    icon_color: >-
      {% if states('sensor.luxtronik_2_0_bath_boost_status') == 'Active' %}
        orange
      {% else %}
        blue
      {% endif %}
    tap_action:
      action: call-service
      service: button.press
      target:
        entity_id: button.luxtronik_2_0_bath_boost

  # Progress bar (only visible during boost)
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.luxtronik_2_0_bath_boost_status
        state: "Active"
    card:
      type: gauge
      entity: sensor.luxtronik_2_0_hot_water_temperature
      name: Hot Water Temperature
      min: 40
      max: 70
      severity:
        green: 60
        yellow: 50
        red: 40

